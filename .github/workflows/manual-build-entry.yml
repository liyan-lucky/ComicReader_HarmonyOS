name: Build ComicReader HAP

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build unsigned OpenHarmony HAP
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CI: "true"
      BUILD_PLATFORM: openharmony
      BUILD_PLATFORM_NAME: OpenHarmony
      BUILD_RUNTIME_OS: OpenHarmony
      BUILD_ABI: x86_64
      BUILD_PRODUCT: openharmony_verify
      HARMONYOS_SDK_URL: ${{ secrets.HARMONYOS_SDK_URL || vars.HARMONYOS_SDK_URL }}
      ARTIFACT_DIR: /tmp/comic_reader_harmonyos_artifacts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip p7zip-full zip curl jq python3 rsync file

      - name: Install combined HarmonyOS command line SDK
        shell: bash
        run: |
          set -euo pipefail
          test -n "${HARMONYOS_SDK_URL:-}"
          SDK_BASE="/home/runner/harmonyos-sdk"
          TOOLS_ROOT="$SDK_BASE/command-line-tools"
          SDK_ARCHIVE="$RUNNER_TEMP/harmonyos-command-line-sdk.pkg"
          SDK_EXTRACT="$RUNNER_TEMP/harmonyos-command-line-sdk"
          rm -rf "$SDK_BASE" "$SDK_EXTRACT"
          mkdir -p "$TOOLS_ROOT" "$SDK_EXTRACT"
          curl -L --fail --retry 3 --retry-delay 5 -o "$SDK_ARCHIVE" "$HARMONYOS_SDK_URL"
          if 7z l "$SDK_ARCHIVE" >/dev/null 2>&1; then
            7z x -y "$SDK_ARCHIVE" "-o$SDK_EXTRACT"
          else
            unzip -oq "$SDK_ARCHIVE" -d "$SDK_EXTRACT"
          fi
          echo "Archive directories:"
          find "$SDK_EXTRACT" -maxdepth 8 -type d | sort | head -260

          HVIGORW="$(find "$SDK_EXTRACT" -type f -name hvigorw.js | sort | head -1)"
          OHOS_DIR="$(find "$SDK_EXTRACT" -type d -path '*/sdk/default/openharmony' | sort | head -1)"
          if [ -z "$OHOS_DIR" ]; then
            OHOS_DIR="$(find "$SDK_EXTRACT" -type d -path '*/openharmony' | while read -r d; do [ -d "$d/native" ] && echo "$d"; done | sort | head -1)"
          fi
          if [ -z "$HVIGORW" ]; then
            echo "Could not locate hvigorw.js in combined SDK archive." >&2
            find "$SDK_EXTRACT" -maxdepth 12 -type f | sort | head -320 >&2
            exit 1
          fi
          if [ -z "$OHOS_DIR" ]; then
            echo "Could not locate OpenHarmony SDK directory in combined SDK archive." >&2
            find "$SDK_EXTRACT" -maxdepth 12 -type d | sort | head -320 >&2
            exit 1
          fi

          HVIGOR_ROOT="$(dirname "$(dirname "$HVIGORW")")"
          SDK_DEFAULT_DIR="${OHOS_DIR%/openharmony}"
          SDK_CONTAINER_DIR="$(dirname "$SDK_DEFAULT_DIR")"
          echo "HVIGOR_ROOT=$HVIGOR_ROOT"
          echo "SDK_DEFAULT_DIR=$SDK_DEFAULT_DIR"
          echo "SDK_CONTAINER_DIR=$SDK_CONTAINER_DIR"

          rsync -a "$HVIGOR_ROOT/" "$TOOLS_ROOT/hvigor/"
          if [ -d "$(dirname "$HVIGOR_ROOT")/ohpm" ]; then
            rsync -a "$(dirname "$HVIGOR_ROOT")/ohpm/" "$TOOLS_ROOT/ohpm/"
          fi
          if [ -d "$(dirname "$HVIGOR_ROOT")/bin" ]; then
            rsync -a "$(dirname "$HVIGOR_ROOT")/bin/" "$TOOLS_ROOT/bin/"
          fi
          if [ "$(basename "$SDK_CONTAINER_DIR")" = "sdk" ]; then
            rsync -a "$SDK_CONTAINER_DIR/" "$TOOLS_ROOT/sdk/"
          else
            mkdir -p "$TOOLS_ROOT/sdk/default"
            rsync -a "$SDK_DEFAULT_DIR/" "$TOOLS_ROOT/sdk/default/"
          fi

          chmod +x "$TOOLS_ROOT/hvigor/bin"/* 2>/dev/null || true
          chmod +x "$TOOLS_ROOT/ohpm/bin"/* 2>/dev/null || true
          chmod +x "$TOOLS_ROOT/bin"/* 2>/dev/null || true
          chmod +x "$TOOLS_ROOT/sdk/default/openharmony/toolchains"/* 2>/dev/null || true
          chmod +x "$TOOLS_ROOT/sdk/default/openharmony/native/llvm/bin"/* 2>/dev/null || true
          chmod +x "$TOOLS_ROOT/sdk/default/openharmony/native/build-tools/cmake/bin"/* 2>/dev/null || true
          chmod +x "$TOOLS_ROOT/sdk/default/openharmony/ets/build-tools/ets-loader/bin/ark/build/bin"/* 2>/dev/null || true

          echo "Installed command-line tools:"
          find "$TOOLS_ROOT" -maxdepth 5 -type d | sort | head -220
          test -f "$TOOLS_ROOT/hvigor/bin/hvigorw.js"
          test -f "$TOOLS_ROOT/hvigor/hvigor-ohos-plugin/node_modules/@ohos/hos-sdkmanager-common/build/src/hos/mapper/platform-sdks.js"
          test -d "$TOOLS_ROOT/sdk/default/openharmony/native"
          test -f "$TOOLS_ROOT/sdk/default/openharmony/native/build/cmake/ohos.toolchain.cmake"

      - name: Configure SDK environment
        shell: bash
        run: |
          set -euo pipefail
          SDK_BASE="/home/runner/harmonyos-sdk"
          TOOLS_ROOT="$SDK_BASE/command-line-tools"
          SDK_ROOT="$TOOLS_ROOT/sdk/default"
          OHOS_ROOT="$SDK_ROOT/openharmony"
          NATIVE_ROOT="$OHOS_ROOT/native"
          NODE_ROOT="$(dirname "$(dirname "$(command -v node)")")"
          find "$SDK_BASE" -maxdepth 7 -type d | sort || true
          {
            echo "DEVECO_SDK_HOME=$SDK_ROOT"
            echo "OHOS_HVIGOR_SDK_ROOT=$SDK_ROOT"
            echo "TABSSH_HWSDK_ROOT=$SDK_ROOT"
            echo "HARMONYOS_SDK_ROOT=$SDK_ROOT"
            echo "HARMONYOS_SDK_DIR=$OHOS_ROOT"
            echo "OHOS_SDK_HOME=$OHOS_ROOT"
            echo "OHOS_NDK_HOME=$NATIVE_ROOT"
            echo "DEVECO_TOOLS_HOME=$TOOLS_ROOT"
            echo "DEVECO_TOOLS_ROOT=$TOOLS_ROOT"
            echo "HARMONYOS_NODE_DIR=$NODE_ROOT"
            echo "DEVECO_NODE_EXE=$(command -v node)"
            echo "PATH=$TOOLS_ROOT/bin:$TOOLS_ROOT/ohpm/bin:$TOOLS_ROOT/hvigor/bin:$OHOS_ROOT/toolchains:$NATIVE_ROOT/llvm/bin:$NATIVE_ROOT/build-tools/cmake/bin:$PATH"
            echo "LD_LIBRARY_PATH=$OHOS_ROOT/previewer/common/bin:$OHOS_ROOT/ets/build-tools/ets-loader/bin/ark/build/bin:$OHOS_ROOT/toolchains:$OHOS_ROOT/toolchains/lib:$NATIVE_ROOT/sysroot/usr/lib/x86_64-linux-ohos:${LD_LIBRARY_PATH:-}"
          } >> "$GITHUB_ENV"
          {
            echo "sdk.dir=$SDK_ROOT"
            echo "hwsdk.dir=$SDK_ROOT"
            echo "npm.dir=$NODE_ROOT"
          } > local.properties

      - name: Build unsigned HAP
        shell: bash
        run: |
          set -euo pipefail
          unset NODE_OPTIONS
          node scripts/build_hap_ci.js assembleHap
          echo "Possible artifacts after hvigor:"
          find "$GITHUB_WORKSPACE" -type f \( -name '*.hap' -o -name '*.app' -o -name '*.har' -o -name '*.zip' \) -print | sort || true

      - name: Collect HAP artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACT_DIR"
          find "$GITHUB_WORKSPACE" -type f \( -name '*.hap' -o -name '*.app' -o -name '*.har' \) -print | sort | tee "$RUNNER_TEMP/artifact-list.txt"
          if ! grep -q '\.hap$' "$RUNNER_TEMP/artifact-list.txt"; then
            echo "No HAP found." >&2
            find "$GITHUB_WORKSPACE/entry" -maxdepth 10 -type f | sort | head -300 >&2 || true
            exit 1
          fi
          grep '\.hap$' "$RUNNER_TEMP/artifact-list.txt" | while IFS= read -r hap; do
            cp -f "$hap" "$ARTIFACT_DIR/$(basename "$hap")"
          done
          find "$ARTIFACT_DIR" -maxdepth 1 -type f -print | sort

      - name: Upload hvigor diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comic-reader-hvigor-logs
          path: |
            .hvigor/outputs/**
            entry/.hvigor/outputs/**
          if-no-files-found: ignore

      - name: Upload HAP artifact
        uses: actions/upload-artifact@v4
        with:
          name: comic-reader-hap
          path: /tmp/comic_reader_harmonyos_artifacts/*
          if-no-files-found: error
