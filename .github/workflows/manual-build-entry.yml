name: APP手动构建入口

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/manual-build-entry.yml"

permissions:
  contents: read

jobs:
  check:
    name: 检查手动触发是否可用
    runs-on: ubuntu-latest
    steps:
      - name: 打印说明
        run: |
          echo "这个流程用于确认 GitHub 手动触发按钮是否正常显示。"
          echo "如果这个流程能显示 Run workflow，说明仓库 Actions 权限没问题。"
          echo "下一步再使用 漫画浏览器 Linux 在线构建 进行正式 HAP 构建。"

      - name: 检查两个构建链接对象
        env:
          HARMONYOS_SDK_URL: ${{ secrets.HARMONYOS_SDK_URL || vars.HARMONYOS_SDK_URL }}
          HARMONYOS_FULL_URL: ${{ secrets.HARMONYOS_FULL_URL || vars.HARMONYOS_FULL_URL }}
        run: |
          if [ -z "${HARMONYOS_SDK_URL:-}" ]; then
            echo "未检测到 HARMONYOS_SDK_URL。"
          else
            echo "已检测到 HARMONYOS_SDK_URL。"
          fi
          if [ -z "${HARMONYOS_FULL_URL:-}" ]; then
            echo "未检测到 HARMONYOS_FULL_URL。"
          else
            echo "已检测到 HARMONYOS_FULL_URL。"
          fi
