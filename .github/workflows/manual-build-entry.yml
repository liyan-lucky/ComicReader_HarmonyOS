name: APP手动构建入口

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: OpenHarmony x86_64 unsigned HAP
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CI: "true"
      BUILD_PLATFORM: openharmony
      BUILD_PLATFORM_NAME: OpenHarmony
      BUILD_RUNTIME_OS: HarmonyOS
      BUILD_ABI: x86_64
      BUILD_PRODUCT: openharmony_verify
      HARMONYOS_SDK_URL: ${{ secrets.HARMONYOS_SDK_URL || vars.HARMONYOS_SDK_URL }}
      HARMONYOS_FULL_URL: ${{ secrets.HARMONYOS_FULL_URL || vars.HARMONYOS_FULL_URL }}
      ARTIFACT_DIR: /tmp/comic_reader_harmonyos_artifacts

    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      - name: 准备 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: 准备 Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装系统工具
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip zip curl jq python3 rsync file

      - name: 安装基础 HarmonyOS SDK
        uses: harmonyos-dev/setup-harmonyos-sdk@0.2.1
        with:
          version: 2.0.0.2

      - name: 安装完整 SDK
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          test -n "${HARMONYOS_SDK_URL:-}"
          SDK_BASE="/home/runner/harmonyos-sdk"
          SDK_ZIP="$RUNNER_TEMP/harmonyos-sdk-full.zip"
          SDK_EXTRACT="$RUNNER_TEMP/harmonyos-sdk-full"
          rm -rf "$SDK_EXTRACT"
          mkdir -p "$SDK_EXTRACT" "$SDK_BASE"
          curl -L --fail --retry 3 --retry-delay 5 -o "$SDK_ZIP" "$HARMONYOS_SDK_URL"
          unzip -oq "$SDK_ZIP" -d "$SDK_EXTRACT"
          echo "SDK archive directories"
          find "$SDK_EXTRACT" -maxdepth 3 -type d | sort | head -100
          SDK_SOURCE=""
          for candidate in \
            "$SDK_EXTRACT" \
            "$SDK_EXTRACT"/* \
            "$SDK_EXTRACT"/default \
            "$SDK_EXTRACT"/sdk/default \
            "$SDK_EXTRACT"/*/default \
            "$SDK_EXTRACT"/*/sdk/default
          do
            if [ -d "$candidate/openharmony" ] || [ -d "$candidate/hms" ] || [ -f "$candidate/sdk-pkg.json" ]; then
              SDK_SOURCE="$candidate"
              break
            fi
          done
          if [ -z "$SDK_SOURCE" ]; then
            echo "Could not locate SDK root in archive."
            find "$SDK_EXTRACT" -maxdepth 5 -type f | sort | head -160
            exit 1
          fi
          echo "SDK source: $SDK_SOURCE"
          rm -rf "$SDK_BASE/openharmony" "$SDK_BASE/hms" "$SDK_BASE/sdk-pkg.json" "$SDK_BASE/HarmonyOS-6.1.1"
          [ ! -e "$SDK_SOURCE/openharmony" ] || mv "$SDK_SOURCE/openharmony" "$SDK_BASE/openharmony"
          if [ -e "$SDK_SOURCE/hms" ]; then
            mv "$SDK_SOURCE/hms" "$SDK_BASE/hms"
          elif [ -e "$SDK_SOURCE/HarmonyOS-6.1.1" ]; then
            mv "$SDK_SOURCE/HarmonyOS-6.1.1" "$SDK_BASE/hms"
          fi
          [ ! -e "$SDK_SOURCE/sdk-pkg.json" ] || mv "$SDK_SOURCE/sdk-pkg.json" "$SDK_BASE/sdk-pkg.json"
          if [ ! -e "$SDK_BASE/HarmonyOS-6.1.1" ] && [ -d "$SDK_BASE/hms" ]; then
            ln -s hms "$SDK_BASE/HarmonyOS-6.1.1"
          fi
          chmod +x "$SDK_BASE/openharmony/toolchains"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/hms/toolchains"/* 2>/dev/null || true
          chmod +x "$SDK_BASE/openharmony/previewer/common/bin"/* 2>/dev/null || true
          echo "Check full SDK files"
          test -f "$SDK_BASE/sdk-pkg.json"
          test -x "$SDK_BASE/openharmony/toolchains/restool"
          test -f "$SDK_BASE/openharmony/ets/build-tools/ets-loader/bin/ark/build/bin/libsec_shared.so"

      - name: 替换完整 hvigor
        shell: bash
        run: |
          set -euo pipefail
          test -n "${HARMONYOS_FULL_URL:-}"
          SDK_BASE="/home/runner/harmonyos-sdk"
          TOOLS_DIR="$SDK_BASE/command-line-tools"
          HVIGOR_ZIP="$RUNNER_TEMP/harmonyos-hvigor-full.zip"
          mkdir -p "$TOOLS_DIR"
          cd "$TOOLS_DIR"
          rm -rf hvigor
          curl -L --fail --retry 3 --retry-delay 5 -o "$HVIGOR_ZIP" "$HARMONYOS_FULL_URL"
          unzip -oq "$HVIGOR_ZIP" -d "$TOOLS_DIR"
          find "$TOOLS_DIR/hvigor" -name "hvigorw.js" | head -20
          find "$TOOLS_DIR/hvigor" -name "platform-sdks.js" | head -20
          test -f "$TOOLS_DIR/hvigor/bin/hvigorw.js"
          test -f "$TOOLS_DIR/hvigor/hvigor-ohos-plugin/node_modules/@ohos/hos-sdkmanager-common/build/src/hos/mapper/platform-sdks.js"

      - name: 配置 SDK 环境
        shell: bash
        run: |
          set -euo pipefail
          SDK_BASE="/home/runner/harmonyos-sdk"
          NODE_ROOT="$(dirname "$(dirname "$(command -v node)")")"
          find "$SDK_BASE" -maxdepth 6 -type d | sort || true
          echo "DEVECO_SDK_HOME=$SDK_BASE" >> "$GITHUB_ENV"
          echo "OHOS_HVIGOR_SDK_ROOT=$SDK_BASE" >> "$GITHUB_ENV"
          echo "DEVECO_TOOLS_HOME=$SDK_BASE/command-line-tools" >> "$GITHUB_ENV"
          echo "DEVECO_TOOLS_ROOT=$SDK_BASE/command-line-tools" >> "$GITHUB_ENV"
          echo "TABSSH_HWSDK_ROOT=$SDK_BASE" >> "$GITHUB_ENV"
          echo "HARMONYOS_SDK_DIR=$SDK_BASE/openharmony" >> "$GITHUB_ENV"
          echo "HARMONYOS_NODE_DIR=$NODE_ROOT" >> "$GITHUB_ENV"
          echo "DEVECO_NODE_EXE=$(command -v node)" >> "$GITHUB_ENV"
          echo "PATH=$SDK_BASE/command-line-tools/bin:$SDK_BASE/command-line-tools/ohpm/bin:$SDK_BASE/command-line-tools/hvigor/bin:$PATH" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$SDK_BASE/hms/toolchains/lib:$SDK_BASE/openharmony/previewer/common/bin:$SDK_BASE/openharmony/ets/build-tools/ets-loader/bin/ark/build/bin:$SDK_BASE/openharmony/toolchains:$SDK_BASE/openharmony/toolchains/lib:$SDK_BASE/hms/native/sysroot/usr/lib/x86_64-linux-ohos:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          {
            echo "sdk.dir=$SDK_BASE/openharmony"
            echo "hwsdk.dir=$SDK_BASE"
            echo "npm.dir=$NODE_ROOT"
          } > local.properties

      - name: 构建未签名 HAP
        shell: bash
        run: |
          set -euo pipefail
          unset NODE_OPTIONS
          node scripts/run_hvigor_with_sdk_patch.js assembleHap
          echo "Build tree after hvigor:"
          find "$GITHUB_WORKSPACE" -maxdepth 6 -type d \( -name build -o -name outputs -o -name default -o -name openharmony_verify \) -print | sort || true
          echo "Possible artifacts after hvigor:"
          find "$GITHUB_WORKSPACE" -type f \( -name '*.hap' -o -name '*.app' -o -name '*.har' -o -name '*.zip' \) -print | sort || true

      - name: 收集 HAP 产物
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACT_DIR"
          echo "Search output directories:"
          find "$GITHUB_WORKSPACE" -maxdepth 8 -type d \( -name outputs -o -name build -o -name default -o -name openharmony_verify \) -print | sort || true
          echo "Search all build artifacts:"
          find "$GITHUB_WORKSPACE" -type f \( -name '*.hap' -o -name '*.app' -o -name '*.har' \) -print | sort | tee "$RUNNER_TEMP/artifact-list.txt"
          if ! grep -q '\.hap$' "$RUNNER_TEMP/artifact-list.txt"; then
            echo "No HAP found. Showing entry/build file list:" >&2
            find "$GITHUB_WORKSPACE/entry" -maxdepth 10 -type f | sort | head -300 >&2 || true
            exit 1
          fi
          grep '\.hap$' "$RUNNER_TEMP/artifact-list.txt" | while IFS= read -r hap; do
            cp -f "$hap" "$ARTIFACT_DIR/$(basename "$hap")"
          done
          find "$ARTIFACT_DIR" -maxdepth 1 -type f -print | sort

      - name: 上传 hvigor 诊断日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comic-reader-hvigor-logs
          path: |
            .hvigor/outputs/**
            entry/.hvigor/outputs/**
          if-no-files-found: ignore

      - name: 上传 HAP 产物
        uses: actions/upload-artifact@v4
        with:
          name: comic-reader-hap
          path: /tmp/comic_reader_harmonyos_artifacts/*
          if-no-files-found: error
