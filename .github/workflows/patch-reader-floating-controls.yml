name: 应用下一轮 UI 优化到 develop

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/patch-reader-floating-controls.yml
      - scripts/polish_ui.py

permissions:
  contents: write

jobs:
  polish-ui:
    runs-on: ubuntu-latest
    steps:
      - name: 检出 develop
        uses: actions/checkout@v4
        with:
          ref: develop
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 拉取 main 上的 UI 优化脚本
        run: |
          git fetch origin main
          git checkout origin/main -- scripts/polish_ui.py

      - name: 执行 UI 优化脚本
        run: python3 scripts/polish_ui.py

      - name: 提交到 develop
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add entry/src/main/ets/pages/Index.ets scripts/polish_ui.py
          if git diff --cached --quiet; then
            echo "No change needed."
          else
            git commit -m "style(ui): polish search home and result cards"
            git push origin HEAD:develop
          fi
