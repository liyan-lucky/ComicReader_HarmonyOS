name: Cleanup Actions Runs

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Only list runs, do not delete"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      keep_current_run:
        description: "Keep this cleanup workflow run"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    name: Delete workflow run history
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          DRY_RUN: ${{ inputs.dry_run }}
          KEEP_CURRENT_RUN: ${{ inputs.keep_current_run }}
        shell: bash
        run: |
          set -euo pipefail
          page=1
          deleted=0
          skipped=0
          while true; do
            runs="$(gh api "/repos/$REPO/actions/runs?per_page=100&page=$page" --jq '.workflow_runs[] | [.id, .name, .status, .conclusion] | @tsv')"
            if [ -z "$runs" ]; then
              break
            fi
            while IFS=$'\t' read -r run_id run_name run_status run_conclusion; do
              [ -n "$run_id" ] || continue
              if [ "$KEEP_CURRENT_RUN" = "true" ] && [ "$run_id" = "$CURRENT_RUN_ID" ]; then
                echo "SKIP current run: $run_id $run_name"
                skipped=$((skipped + 1))
                continue
              fi
              if [ "$DRY_RUN" = "true" ]; then
                echo "DRY-RUN delete: $run_id $run_name [$run_status/$run_conclusion]"
              else
                echo "Deleting run: $run_id $run_name [$run_status/$run_conclusion]"
                gh api --method DELETE "/repos/$REPO/actions/runs/$run_id" >/dev/null
                deleted=$((deleted + 1))
              fi
            done <<< "$runs"
            page=$((page + 1))
          done
          echo "deleted=$deleted skipped=$skipped dry_run=$DRY_RUN"
