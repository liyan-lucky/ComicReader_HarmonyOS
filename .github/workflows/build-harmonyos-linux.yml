name: 漫画浏览器 Linux 在线构建

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-harmonyos-linux.yml"
      - "scripts/github_build_harmonyos_linux.sh"

permissions:
  contents: read

concurrency:
  group: comic-reader-harmonyos-build
  cancel-in-progress: false

jobs:
  build:
    name: Linux 构建 HAP 包
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      HARMONYOS_SDK_URL: ${{ secrets.HARMONYOS_SDK_URL || vars.HARMONYOS_SDK_URL }}
      HARMONYOS_FULL_URL: ${{ secrets.HARMONYOS_FULL_URL || vars.HARMONYOS_FULL_URL }}
      ARTIFACT_DIR: ${{ runner.temp }}/comic_reader_harmonyos_artifacts

    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      - name: 准备 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: 准备 Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装系统工具
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip zip curl jq python3 rsync file

      - name: 执行中文构建脚本
        shell: bash
        run: |
          chmod +x scripts/github_build_harmonyos_linux.sh
          scripts/github_build_harmonyos_linux.sh

      - name: 上传 HAP 产物
        uses: actions/upload-artifact@v4
        with:
          name: 漫画浏览器-HAP-构建产物
          path: ${{ runner.temp }}/comic_reader_harmonyos_artifacts/*
          if-no-files-found: error
