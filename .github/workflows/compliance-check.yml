name: 合规检查

on:
  workflow_dispatch:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop

permissions:
  contents: read

jobs:
  repository-check:
    name: 仓库合规检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 检查必需文件
        run: |
          test -f README.md
          test -f LICENSE
          test -f NOTICE.md
          test -f DISCLAIMER.md
          test -f PRIVACY.md
          test -f SECURITY.md
          test -f THIRD_PARTY_NOTICES.md
          test -f CONTRIBUTING.md
          test -f COMPLIANCE.md
          test -f MAINTAINERS.md
          test -f COPYRIGHT
          test -f RELEASE_CHECKLIST.md
          test -f docs/README.md
          test -f docs/development/DEVELOPMENT_REQUIREMENTS.md
          test -f docs/development/DEVELOPMENT_ISSUES.md
          test -f docs/development/REPOSITORY_STANDARDS.md
          test -f docs/development/BRANCH_RULES.md
          test -f docs/development/GITHUB_WORKFLOW.md
          test -f docs/development/UI_RULES.md
          test -f docs/architecture/ARCHITECTURE.md
          test -f entry/src/main/ets/common/RuleValidator.ets

      - name: 检查禁止提交的发布包和签名文件
        run: |
          ! find . -type f \( -iname "*.hap" -o -iname "*.app" -o -iname "*.p12" -o -iname "*.pfx" -o -iname "*.jks" -o -iname "*.keystore" -o -iname "*.pem" -o -iname "*.key" \) | grep .

      - name: 检查包许可证元数据
        run: |
          grep -q '"license": "MIT"' oh-package.json5
          grep -q '"license": "MIT"' entry/oh-package.json5

      - name: 检查远程规则加固标记
        run: |
          grep -q 'EXPECTED_SCHEMA' entry/src/main/ets/common/RemoteRuleService.ets
          grep -q 'MAX_REMOTE_RULES' entry/src/main/ets/common/RemoteRuleService.ets
          grep -q 'isValidPublicRule' entry/src/main/ets/common/RemoteRuleService.ets
          grep -q 'isUnsafeUrlScheme' entry/src/main/ets/common/UrlUtil.ets
          grep -q 'Only HTTP/HTTPS URLs are allowed' entry/src/main/ets/common/HttpClient.ets

      - name: 检查解析器加固标记
        run: |
          grep -q 'isHttpUrl(url)' entry/src/main/ets/common/HtmlParser.ets
          grep -q 'looksLikeImage' entry/src/main/ets/common/HtmlParser.ets
          grep -q 'parseNextPageUrl' entry/src/main/ets/common/HtmlParser.ets
