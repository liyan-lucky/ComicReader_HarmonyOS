name: 清理旧构建产物和流程记录

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 预览模式，不真正删除。默认 true。
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      cleanup_artifacts:
        description: 是否清理 artifacts
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      artifact_keep_days:
        description: Artifact 至少保留天数。填 0 表示不按天数保留。
        required: true
        default: "0"
        type: string
      artifact_keep_latest_per_name:
        description: 每个 Artifact 名称至少保留最近几个。填 0 表示不保留。
        required: true
        default: "0"
        type: string
      cleanup_workflow_runs:
        description: 是否清理 workflow run 记录
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      clear_all_workflow_runs:
        description: 危险选项：清空所有可删除 workflow run 记录，只保留当前运行中记录。默认 false。
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      workflow_run_keep_days:
        description: Workflow run 至少保留天数。填 0 表示不按天数保留。
        required: true
        default: "0"
        type: string
      workflow_run_keep_latest_per_workflow:
        description: 每个 workflow 至少保留最近几个 runs。填 0 表示不保留。
        required: true
        default: "0"
        type: string

permissions:
  actions: write
  contents: read

concurrency:
  group: 清理旧构建产物和流程记录
  cancel-in-progress: false

jobs:
  cleanup:
    name: 预览或清理 artifact 和 workflow 记录
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 清理旧 artifact
        if: ${{ github.event.inputs.cleanup_artifacts == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const dryRun = '${{ github.event.inputs.dry_run }}' !== 'false';
            const keepDaysRaw = Number.parseInt('${{ github.event.inputs.artifact_keep_days }}', 10);
            const keepLatestRaw = Number.parseInt('${{ github.event.inputs.artifact_keep_latest_per_name }}', 10);
            const keepDays = Number.isFinite(keepDaysRaw) ? Math.max(0, keepDaysRaw) : 0;
            const keepLatestPerName = Number.isFinite(keepLatestRaw) ? Math.max(0, keepLatestRaw) : 0;
            const cutoff = keepDays > 0 ? Date.now() - keepDays * 24 * 60 * 60 * 1000 : Number.MAX_SAFE_INTEGER;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
              owner,
              repo,
              per_page: 100
            });

            const grouped = new Map();
            for (const artifact of artifacts) {
              const list = grouped.get(artifact.name) || [];
              list.push(artifact);
              grouped.set(artifact.name, list);
            }

            const deleteCandidates = [];
            for (const [name, list] of grouped.entries()) {
              list.sort((a, b) => new Date(b.created_at).getTime() - new Date(a.created_at).getTime());
              for (let index = 0; index < list.length; index++) {
                const artifact = list[index];
                const created = new Date(artifact.created_at).getTime();
                const keepBecauseLatest = index < keepLatestPerName;
                const keepBecauseYoung = keepDays > 0 && created >= cutoff;
                if (!keepBecauseLatest && !keepBecauseYoung) {
                  deleteCandidates.push(artifact);
                }
              }
            }

            core.summary.addHeading('Artifact 清理预览/结果');
            core.summary.addRaw(`预览模式：${dryRun}\n\n`);
            core.summary.addRaw(`Artifact 总数：${artifacts.length}\n\n`);
            core.summary.addRaw(`候选删除数：${deleteCandidates.length}\n\n`);
            core.summary.addRaw(`保留天数：${keepDays}\n\n`);
            core.summary.addRaw(`每个名称保留最近：${keepLatestPerName}\n\n`);

            for (const artifact of deleteCandidates) {
              const line = `- ${artifact.name} #${artifact.id} created=${artifact.created_at} size=${artifact.size_in_bytes}`;
              console.log(line);
              core.summary.addRaw(`${line}\n`);
              if (!dryRun) {
                await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: artifact.id });
              }
            }

            await core.summary.write();

      - name: 清理 workflow runs
        if: ${{ github.event.inputs.cleanup_workflow_runs == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const dryRun = '${{ github.event.inputs.dry_run }}' !== 'false';
            const clearAll = '${{ github.event.inputs.clear_all_workflow_runs }}' === 'true';
            const keepDaysRaw = Number.parseInt('${{ github.event.inputs.workflow_run_keep_days }}', 10);
            const keepLatestRaw = Number.parseInt('${{ github.event.inputs.workflow_run_keep_latest_per_workflow }}', 10);
            const keepDays = clearAll ? 0 : (Number.isFinite(keepDaysRaw) ? Math.max(0, keepDaysRaw) : 0);
            const keepLatestPerWorkflow = clearAll ? 0 : (Number.isFinite(keepLatestRaw) ? Math.max(0, keepLatestRaw) : 0);
            const cutoff = keepDays > 0 ? Date.now() - keepDays * 24 * 60 * 60 * 1000 : Number.MAX_SAFE_INTEGER;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const currentRunId = context.runId;

            const workflows = await github.paginate(github.rest.actions.listRepoWorkflows, {
              owner,
              repo,
              per_page: 100
            });

            const deleteCandidates = [];
            for (const workflow of workflows) {
              const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
                owner,
                repo,
                workflow_id: workflow.id,
                per_page: 100
              });
              runs.sort((a, b) => new Date(b.created_at).getTime() - new Date(a.created_at).getTime());
              for (let index = 0; index < runs.length; index++) {
                const run = runs[index];
                const created = new Date(run.created_at).getTime();
                const keepBecauseLatest = !clearAll && index < keepLatestPerWorkflow;
                const keepBecauseYoung = !clearAll && keepDays > 0 && created >= cutoff;
                const keepBecauseCurrent = run.id === currentRunId;
                const keepBecauseRunning = ['queued', 'in_progress', 'waiting', 'requested', 'pending'].includes(run.status);
                if (!keepBecauseLatest && !keepBecauseYoung && !keepBecauseCurrent && !keepBecauseRunning) {
                  deleteCandidates.push({ workflow, run });
                }
              }
            }

            core.summary.addHeading('Workflow run 清理预览/结果');
            core.summary.addRaw(`预览模式：${dryRun}\n\n`);
            core.summary.addRaw(`清空全部模式：${clearAll}\n\n`);
            core.summary.addRaw(`候选删除数：${deleteCandidates.length}\n\n`);
            core.summary.addRaw(`保留天数：${keepDays}\n\n`);
            core.summary.addRaw(`每个 workflow 保留最近：${keepLatestPerWorkflow}\n\n`);

            for (const item of deleteCandidates) {
              const line = `- ${item.workflow.name} run #${item.run.run_number} id=${item.run.id} created=${item.run.created_at} status=${item.run.status}`;
              console.log(line);
              core.summary.addRaw(`${line}\n`);
              if (!dryRun) {
                await github.rest.actions.deleteWorkflowRun({ owner, repo, run_id: item.run.id });
              }
            }

            await core.summary.write();
